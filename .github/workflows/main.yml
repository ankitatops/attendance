on:
  push:
    tags:
      - 'v*'  # Sirf tag push par trigger thase

name: "Build & Release"

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Build iOS IPA
        run: |
          flutter build ios --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cd Payload
          ln -s ../Runner.app
          cd ..
          zip -r app.ipa Payload

      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/apk/release/*.apk,build/ios/iphoneos/app.ipa"
          tag: ${{ github.ref_name }}
          token: ${{ secrets.TOKEN }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## 🚀 New Release ${{ github.ref_name }}
            ### Downloads
            - **Android (Modern):** app-arm64-v8a-release.apk
            - **Android (Old):** app-armeabi-v7a-release.apk
            - **iOS:** app.ipa